<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R.I.P.P.A. — Translation Target Scenes</title>
<meta name="robots" content="noindex">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
    background:#000;color:#fff;overflow:hidden}

  /* each scene fills the viewport */
  .scene{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    background-size:cover;background-position:center}
  .scene.active{display:flex}
  .scene::before{content:'';position:absolute;inset:0;background:var(--tint,rgba(0,0,0,.45))}

  /* the realistic "sign / menu" card the app will OCR */
  .card{position:relative;z-index:2;max-width:min(86vw,820px);width:100%;
    padding:5vh 6vw;border-radius:18px;text-align:center;
    box-shadow:0 30px 90px rgba(0,0,0,.55)}
  .card .title{font-weight:800;line-height:1.1;margin-bottom:.5em}
  .card .sub{font-weight:600;opacity:.85;margin-bottom:1.1em;letter-spacing:.5px}
  .card .lines{display:flex;flex-direction:column;gap:.55em;
    font-weight:600;line-height:1.35}
  .card .foot{margin-top:1.2em;font-weight:600;opacity:.85}
  /* fluid type — large & crisp so the headset can OCR it across the room */
  .card .title{font-size:clamp(34px,6.4vw,80px)}
  .card .sub{font-size:clamp(20px,3.4vw,40px)}
  .card .lines{font-size:clamp(22px,3.8vw,46px)}
  .card .foot{font-size:clamp(18px,3vw,36px)}
  .rtl .card{direction:rtl}

  /* ---- themes ---- */
  .t-chalk .card{background:#1d2722;color:#f3efe2;border:3px solid #3a4a40;
    font-family:'Bradley Hand','Comic Sans MS',cursive;
    background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);background-size:6px 6px}
  .t-wood .card{background:linear-gradient(#3a2417,#241208);color:#ffe9c8;border:4px solid #5a3a22}
  .t-paper .card{background:#f6f1e6;color:#1a1410;border:1px solid #d8cdb6;
    font-family:'Hiragino Mincho ProN','Songti SC','Noto Serif',serif}
  .t-red .card{background:linear-gradient(#7a1414,#4a0c0c);color:#ffe9b0;border:3px solid #c9a24a}
  .t-board .card{background:#0a0e12;color:#dffbe6;border:1px solid #1d3a2a;
    font-family:'SF Mono',ui-monospace,monospace;text-align:left}
  .t-board .title,.t-board .sub,.t-board .foot{text-align:left}
  .t-enamel .card{background:#0d4d8c;color:#fff;border:5px solid #fff;border-radius:26px}
  .t-hangul .card{background:#14181f;color:#eaf2ff;border:2px solid #2a3340;
    font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif}
  .t-arab .card{background:#10241f;color:#f2e9c8;border:2px solid #2f6b54;
    font-family:'Geeza Pro','Noto Naskh Arabic',serif}
  .t-cyr .card{background:#1a1410;color:#ffefcf;border:3px solid #6b4a2a}

  /* ---- chrome (hidden in record mode) ---- */
  .chrome{position:fixed;z-index:10;transition:opacity .25s}
  body.clean .chrome{opacity:0;pointer-events:none}
  .label{top:18px;left:20px;font-size:14px;letter-spacing:.5px;
    background:rgba(0,0,0,.5);backdrop-filter:blur(6px);padding:8px 14px;border-radius:20px;
    border:1px solid rgba(255,255,255,.15)}
  .label b{color:#0ff}
  .nav{bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:14px;
    background:rgba(0,0,0,.5);backdrop-filter:blur(6px);padding:10px 16px;border-radius:30px;
    border:1px solid rgba(255,255,255,.15)}
  .nav button{font:inherit;cursor:pointer;background:transparent;border:1px solid rgba(255,255,255,.25);
    color:#fff;width:40px;height:40px;border-radius:50%;font-size:18px;transition:.15s}
  .nav button:hover{border-color:#0ff;color:#0ff}
  .dots{display:flex;gap:7px}
  .dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer}
  .dot.on{background:#0ff;box-shadow:0 0 8px #0ff}
  .tools{top:18px;right:20px;display:flex;gap:8px}
  .tools button{font:inherit;font-size:13px;cursor:pointer;color:#fff;
    background:rgba(0,0,0,.5);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.18);
    padding:8px 13px;border-radius:9px;transition:.15s}
  .tools button:hover{border-color:#0ff;color:#0ff}

  .hint{position:fixed;z-index:10;bottom:74px;left:50%;transform:translateX(-50%);
    font-size:12px;opacity:.45;letter-spacing:.4px;transition:opacity .25s}
  body.clean .hint{opacity:0}
</style>
</head>
<body>
  <div id="stage"></div>

  <div class="chrome label" id="label"></div>
  <div class="chrome tools">
    <button id="cleanBtn" title="Hide all UI so only the scene is captured (press H)">⤢ Record mode</button>
    <button id="fsBtn" title="Fullscreen (press F)">⛶ Fullscreen</button>
  </div>
  <div class="chrome nav">
    <button id="prev">‹</button>
    <div class="dots" id="dots"></div>
    <button id="next">›</button>
  </div>
  <div class="hint">← → switch scene · F fullscreen · H hide UI (record) · Esc show UI</div>

<script>
// Pure SOURCE scenes — foreign text only. The app does the real OCR + translation.
const SCENES = [
  { lang:'Japanese 日本語', flag:'🇯🇵', theme:'t-paper', bg:'assets/scenes/japan_wave.jpg',
    tint:'rgba(8,12,20,.62)',
    title:'居酒屋 さくら', sub:'本日のおすすめ',
    lines:['刺身の盛り合わせ … 1200円','焼き鳥 五本 … 680円','天ぷら定食 … 950円','生ビール … 500円'],
    foot:'ようこそいらっしゃいませ' },

  { lang:'Chinese 中文', flag:'🇨🇳', theme:'t-red',
    title:'老北京餐厅', sub:'今日特色菜',
    lines:['北京烤鸭 … 88元','宫保鸡丁 … 38元','麻婆豆腐 … 28元','西红柿鸡蛋汤 … 18元'],
    foot:'欢迎光临 · 请慢用' },

  { lang:'Korean 한국어', flag:'🇰🇷', theme:'t-hangul',
    title:'서울 분식', sub:'오늘의 메뉴',
    lines:['비빔밥 … 8,000원','김치찌개 … 7,500원','불고기 정식 … 12,000원','떡볶이 … 5,000원'],
    foot:'영업 중입니다 · 어서 오세요' },

  { lang:'French Français', flag:'🇫🇷', theme:'t-chalk', bg:'assets/scenes/cafe_paris.jpg',
    tint:'rgba(6,10,26,.55)',
    title:'Café de la Gare', sub:'Menu du jour',
    lines:["Soupe à l'oignon … 8€",'Croque-monsieur … 9€','Salade niçoise … 11€','Tarte aux pommes … 6€'],
    foot:'Ouvert tous les jours' },

  { lang:'German Deutsch', flag:'🇩🇪', theme:'t-board',
    title:'Hauptbahnhof', sub:'Abfahrt — Departures',
    lines:['Gleis 4 · München · 14:25','Ausgang → Stadtmitte','Vorsicht an der Bahnsteigkante','Fahrkarten am Automaten'],
    foot:'Bitte beachten Sie die Anzeige' },

  { lang:'Spanish Español', flag:'🇪🇸', theme:'t-enamel',
    title:'Mercado Central', sub:'Frutas y verduras frescas',
    lines:['Naranjas … 2€ el kilo','Tomates … 3€ el kilo','Abierto de 9 a 14','Prohibido aparcar'],
    foot:'Salida de emergencia al fondo' },

  { lang:'Italian Italiano', flag:'🇮🇹', theme:'t-wood',
    title:'Trattoria da Luigi', sub:'Specialità della casa',
    lines:['Spaghetti alle vongole … 12€','Pizza margherita … 8€','Lasagne al forno … 10€','Tiramisù … 5€'],
    foot:'Buon appetito a tutti' },

  { lang:'Arabic العربية', flag:'🇸🇦', theme:'t-arab', rtl:true,
    title:'مطعم الشرق', sub:'قائمة الطعام',
    lines:['كباب لحم مشوي … ٤٥ ريال','أرز بالدجاج … ٣٠ ريال','سلطة خضار … ١٥ ريال','شاي بالنعناع … ٥ ريال'],
    foot:'أهلاً وسهلاً بكم' },

  { lang:'Russian Русский', flag:'🇷🇺', theme:'t-cyr',
    title:'Центральный рынок', sub:'Свежие продукты каждый день',
    lines:['Хлеб ржаной … 50 рублей','Молоко … 80 рублей','Сыр … 300 рублей','Яблоки … 120 рублей'],
    foot:'Открыто с 8 до 20 · Добро пожаловать' },
];

const stage=document.getElementById('stage');
const dotsEl=document.getElementById('dots');
const labelEl=document.getElementById('label');
let idx=0;

stage.innerHTML=SCENES.map((s,i)=>{
  const bg=s.bg?`background-image:url('${s.bg}')`:'';
  return `<div class="scene ${s.theme}${s.rtl?' rtl':''}" data-i="${i}"
      style="${bg};--tint:${s.tint||'rgba(0,0,0,.5)'}">
    <div class="card">
      <div class="title">${s.title}</div>
      <div class="sub">${s.sub}</div>
      <div class="lines">${s.lines.map(l=>`<div>${l}</div>`).join('')}</div>
      <div class="foot">${s.foot}</div>
    </div></div>`;
}).join('');

dotsEl.innerHTML=SCENES.map((_,i)=>`<div class="dot" data-i="${i}"></div>`).join('');
dotsEl.querySelectorAll('.dot').forEach(d=>d.onclick=()=>show(+d.dataset.i));

function show(i){
  idx=(i+SCENES.length)%SCENES.length;
  stage.querySelectorAll('.scene').forEach((el,j)=>el.classList.toggle('active',j===idx));
  dotsEl.querySelectorAll('.dot').forEach((el,j)=>el.classList.toggle('on',j===idx));
  const s=SCENES[idx];
  labelEl.innerHTML=`${s.flag} <b>${idx+1}/${SCENES.length}</b> · ${s.lang}`;
}
document.getElementById('prev').onclick=()=>show(idx-1);
document.getElementById('next').onclick=()=>show(idx+1);
document.getElementById('cleanBtn').onclick=()=>document.body.classList.toggle('clean');
document.getElementById('fsBtn').onclick=()=>{
  if(!document.fullscreenElement)document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
};
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')show(idx+1);
  else if(e.key==='ArrowLeft')show(idx-1);
  else if(e.key==='f'||e.key==='F')document.getElementById('fsBtn').click();
  else if(e.key==='h'||e.key==='H')document.body.classList.add('clean');
  else if(e.key==='Escape')document.body.classList.remove('clean');
});
show(0);
</script>
</body>
</html>
